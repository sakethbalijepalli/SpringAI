spring.application.name=SpringAI
spring.config.import=optional:classpath:application-secrets.properties

# ── Google Gemini (Chat + Image)
spring.ai.google.genai.api-key=${GOOGLE_API_KEY:YOUR_GOOGLE_API_KEY}
app.image.google-model=gemini-3-pro-image

# ── OpenRouter (Chat + Image)
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.api-key=${OPENAI_API_KEY:YOUR_OPENAI_API_KEY}
spring.ai.openai.image.options.model=google/gemini-3.1-flash-image-preview

# ── Hugging Face (Image) 
app.image.huggingface.api-key=${HUGGINGFACE_API_KEY:YOUR_HUGGINGFACE_API_KEY}
app.image.huggingface.model=black-forest-labs/FLUX.1-schnell

app.image.pollinations.width=512
app.image.pollinations.height=512

# "auto" tries all configured providers in order until one succeeds.
app.image.provider=auto